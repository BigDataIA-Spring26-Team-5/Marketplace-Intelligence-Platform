column_operations:
- target: brand_owner
  type: string
  action: set_null
  status: missing
  reason: No source data available
- target: data_source
  type: string
  action: set_default
  default_value: OpenFoodFacts
- target: product_name
  type: string
  action: extract_json_field
  source: product_name
  key: ''
- target: ingredients
  type: string
  action: extract_json_field
  source: ingredients_text
  key: ''
- target: serving_size
  type: float
  action: regex_extract
  source: serving_size
  pattern: ([0-9]+(?:\.[0-9]+)?)
- target: serving_size_unit
  type: string
  action: regex_extract
  source: serving_size
  pattern: (g|ONZ|oz|ml|l|kg|lb)\b
- target: serving_size_unit
  type: string
  action: value_map
  source: serving_size_unit
  mapping:
    ONZ: oz
    g: g
    oz: oz
    ml: ml
    l: l
    kg: kg
    lb: lb
- target: published_date
  type: string
  action: parse_date
  source: last_modified_t
  format: unix_timestamp
- source: pnns_groups_1
  action: drop_column
- source: pnns_groups_2
  action: drop_column
- source: energy_100g
  action: drop_column
- source: fat_100g
  action: drop_column
- source: carbohydrates_100g
  action: drop_column
- source: proteins_100g
  action: drop_column
- source: salt_100g
  action: drop_column
- source: nova_group
  action: drop_column
- source: nutriscore_grade
  action: drop_column
- source: data_quality_tags
  action: drop_column
