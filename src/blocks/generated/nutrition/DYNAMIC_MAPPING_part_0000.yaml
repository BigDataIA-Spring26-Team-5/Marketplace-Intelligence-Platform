column_operations:
- target: brand_owner
  type: string
  action: set_null
  status: missing
  reason: No source data available
- target: data_source
  type: string
  action: set_default
  default_value: OpenFoodFacts
- target: product_name
  type: string
  action: format_transform
  source: product_name
  normalize_before_dedup: true
- target: ingredients
  type: string
  action: format_transform
  source: ingredients_text
- target: serving_size
  type: float
  action: regex_extract
  source: serving_size
  pattern: ([0-9]+\.?[0-9]*)
- target: serving_size_unit
  type: string
  action: regex_extract
  source: serving_size
  pattern: '[0-9]+\.?[0-9]*\s*([a-zA-Z]+)'
- target: published_date
  type: string
  action: parse_date
  source: published_date
- source: pnns_groups_1
  action: drop_column
- source: pnns_groups_2
  action: drop_column
- source: allergens
  action: drop_column
- source: traces
  action: drop_column
- source: countries
  action: drop_column
- source: energy_100g
  action: drop_column
- source: fat_100g
  action: drop_column
- source: carbohydrates_100g
  action: drop_column
- source: proteins_100g
