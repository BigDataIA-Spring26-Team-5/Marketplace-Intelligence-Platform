apply_if_column_present: fdcId
column_operations:
- target: product_name
  type: string
  action: strip_whitespace
  source: description
- target: brand_name
  type: string
  action: strip_whitespace
  source: brandName
- target: brand_owner
  type: string
  action: strip_whitespace
  source: brandOwner
- target: category
  type: string
  action: strip_whitespace
  source: brandedFoodCategory
- target: category
  type: string
  action: extract_json_field
  source: foodCategory
  key: 'description'
- target: serving_size
  type: float
  action: type_cast
  source: servingSize
- target: serving_size_unit
  type: string
  action: value_map
  source: servingSizeUnit
  mapping:
    GRM: g
    g: g
    oz: oz
    ml: ml
    IU: IU
- target: published_date
  type: string
  action: coalesce
  sources:
  - modifiedDate
  - publicationDate
- target: published_date
  type: string
  action: parse_date
  source: published_date
- target: data_source
  type: string
  action: set_default
  default_value: USDA
  force: true
- source: fdcId
  action: drop_column
- source: dataType
  action: drop_column
- source: _dataType
  action: drop_column
- source: gtinUpc
  action: drop_column
- source: foodNutrients
  action: drop_column
- source: labelNutrients
  action: drop_column
- source: foodUpdateLog
  action: drop_column
- source: tradeChannels
  action: drop_column
- source: microbes
  action: drop_column
- source: foodAttributes
  action: drop_column
- source: gpcClassCode
  action: drop_column
- source: subbrandName
  action: drop_column
- source: dataSource
  action: drop_column
- source: discontinuedDate
  action: drop_column
- source: preparationStateCode
  action: drop_column
- source: shortDescription
  action: drop_column
- source: foodClass
  action: drop_column
- source: marketCountry
  action: drop_column
- source: availableDate
  action: drop_column
- source: publicationDate
  action: drop_column
- source: packageWeight
  action: drop_column
- source: modifiedDate
  action: drop_column
- source: foodCategory
  action: drop_column
- source: inputFoods
  action: drop_column
