column_operations:
- target: serving_size
  type: float
  action: regex_extract
  source: serving_size
  pattern: "[0-9]+\\.?[0-9]*"
- target: serving_size_unit
  type: string
  action: regex_extract
  source: serving_size
  pattern: "g|gram|ml|kg|l|oz|lb|pcs|piece|serving|portion|cup|tbsp|tsp|pack|packet|sachet|tablet|capsule|drop|dose|unit|stick|bar|slice|bottle|can|jar|tube|scoop|bag|box|tin|pot|tub|carton|pouch|squeeze|spray|roll|ball|balloon|block|brick|bundle|case|cluster|container|envelope|packet|package|parcel|portion|pouch|sachet|satchel|sheath|sleeve|strip|tube|wrapper"
- target: serving_size_unit
  type: string
  action: value_map
  source: serving_size_unit
  mapping:
    g: g
    gram: g
    grm: g
    mg: mg
    ml: ml
    milliliter: ml
    l: l
    liter: l
    kg: kg
    kilogram: kg
    oz: oz
    ounce: oz
    lb: lb
    pound: lb
    pcs: piece
    piece: piece
    serving: serving
    portion: serving
    cup: cup
    tbsp: tablespoon
    tablespoon: tablespoon
    tsp: teaspoon
    teaspoon: teaspoon
    pack: pack
    packet: pack
    sachet: pack
    tablet: tablet
    capsule: capsule
    drop: drop
    dose: dose
    unit: unit
    stick: stick
    bar: bar
    slice: slice
    bottle: bottle
    can: can
    jar: jar
    tube: tube
    scoop: scoop
    bag: bag
    box: box
    tin: tin
    pot: pot
    tub: tub
    carton: carton
    pouch: pouch
    squeeze: squeeze
    spray: spray
    roll: roll
    ball: ball
    balloon: balloon
    block: block
    brick: brick
    bundle: bundle
    case: case
    cluster: cluster
    container: container
    envelope: envelope
    package: package
    parcel: parcel
    satchel: satchel
    sheath: sheath
    sleeve: sleeve
    strip: strip
    wrapper: wrapper
- target: published_date
  type: string
  action: parse_date
  source: published_date
- target: data_source
  type: string
  action: set_default
  default_value: OpenFoodFacts
