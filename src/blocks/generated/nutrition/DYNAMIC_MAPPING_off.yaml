column_operations:
- target: brand_owner
  type: string
  action: set_null
  status: missing
  reason: No source data available
- target: data_source
  type: string
  action: set_default
  default_value: OpenFoodFacts
- target: serving_size_unit
  type: string
  action: regex_extract
  source: serving_size
  pattern: (g|oz|ml|l|kg|lb|mg)\b
  keep_source: true
- target: serving_size
  type: float
  action: regex_extract
  source: serving_size
  pattern: ([0-9]+(?:\.[0-9]+)?)
- target: published_date
  type: string
  action: parse_date
  source: published_date
  format: unix_timestamp
- source: code
  action: drop_column
