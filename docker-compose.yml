version: '3.8'

# MIP Platform — full stack
#
# Start everything:
#   docker-compose -p mip up -d
#
# Services:
#   zookeeper     :2181  — Kafka coordination
#   kafka         :9092  — event streaming
#   kafka-connect :8083  — GCS/S3 sink connector
#   airflow       :8080  — pipeline orchestration  (admin / admin)
#   postgres      :5432  — UC2 event log (block_trace, audit_events, quarantine_rows, dedup_clusters, anomaly_reports)
#   prometheus    :9090  — metrics time-series
#   pushgateway   :9091  — batch-job metrics receiver
#   grafana       :3000  — dashboards             (admin / mip_admin)
#   chromadb      :8000  — RAG vector store       (audit_corpus + mem0_memories)
#   redis         :6379  — MCP server query cache (15s Prometheus TTL, 30s Postgres TTL)
#   mlflow        :5000  — experiment tracking    (DSPy + UC3 eval runs)

services:

  # ── Kafka stack ──────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mip_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mip_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: mip_kafka_connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "34.42.181.128:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: mip-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: mip-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: mip-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: mip-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.converters.ByteArrayConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    command:
      - bash
      - -c
      - |
        echo "Installing GCS sink connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.7
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    restart: unless-stopped

  # ── Airflow ──────────────────────────────────────────────────────────────────

  airflow:
    image: apache/airflow:2.8.0
    container_name: mip_airflow
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./output:/opt/airflow/output
    command: standalone
    restart: unless-stopped

  # ── UC2 Observability ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: mip_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     mip
      POSTGRES_PASSWORD: mip_pass
      POSTGRES_DB:       uc2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mip -d uc2"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: mip_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:latest
    container_name: mip_pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mip_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:  mip_admin
      GF_AUTH_ANONYMOUS_ENABLED:   "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:  Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL:          "http://35.239.47.242:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: mip_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mip_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MLflow ────────────────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mip_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  chromadb_data:
  mlflow_data:
