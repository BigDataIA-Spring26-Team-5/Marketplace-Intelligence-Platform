domain: healthcare_test

text_columns: [diagnosis_text, medications, procedures]

fields:
  # Safety fields — S1-only extraction, never inferred by LLM/KNN
  - name: icd10_codes
    strategy: deterministic
    output_type: multi
    patterns:
      - regex: "\\b([A-Z][0-9]{2}(?:\\.[0-9A-Z]{1,4})?)\\b"
        label: icd10

  - name: medication_names
    strategy: deterministic
    output_type: multi
    patterns:
      - regex: "\\b(metformin|lisinopril|atorvastatin|omeprazole|amlodipine|levothyroxine|albuterol|gabapentin|losartan|metoprolol)\\b"
        label: common_medication

  # LLM field — category assignment
  - name: diagnosis_category
    strategy: llm
    output_type: single
    classification_classes:
      - Cardiovascular
      - Diabetes
      - Respiratory
      - Neurological
      - Musculoskeletal
      - Gastrointestinal
      - Mental Health
      - Infectious Disease
      - Oncology
      - Other
    rag_context_field: diagnosis_text
